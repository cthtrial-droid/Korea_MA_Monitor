<head>

<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#162033; --line:#2c3a52;
    --text:#e8edf5; --muted:#9fb0c8; --accent:#3b82f6; --accent2:#22d3ee;
    --green:#22c55e; --amber:#f59e0b; --red:#ef4444; --purple:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Malgun Gothic","맑은 고딕",-apple-system,Segoe UI,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;padding:24px;}
  .wrap{max-width:1280px;margin:0 auto}
  header{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:20px}
  h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .badge{display:inline-block;background:var(--panel);border:1px solid var(--line);
    color:var(--accent2);font-size:12px;padding:2px 9px;border-radius:99px;margin-left:8px}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);
    border-radius:12px;padding:16px 18px}
  .kpi .label{font-size:12px;color:var(--muted)}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px}
  .kpi .val small{font-size:14px;color:var(--muted);font-weight:500}
  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .controls .grp{display:flex;gap:6px;flex-wrap:wrap}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    font-size:12.5px;padding:6px 12px;border-radius:99px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  input[type=search]{background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:7px 12px;border-radius:8px;font-size:13px;min-width:200px;outline:none}
  select{background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:7px 10px;border-radius:8px;font-size:13px;outline:none}
  /* table */
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden}
  thead th{background:var(--panel2);text-align:left;font-size:12px;color:var(--muted);
    padding:11px 12px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
  thead th:hover{color:var(--text)}
  tbody td{padding:12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
  tbody tr:hover{background:#202d44}
  .tgt{font-weight:700;font-size:13.5px}
  .tgt .sec{display:block;font-size:11.5px;color:var(--muted);font-weight:400;margin-top:2px}
  .size{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .size small{display:block;font-weight:400;color:var(--muted);font-size:11px}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .t-pef{background:rgba(167,139,250,.15);color:var(--purple)}
  .t-mgmt{background:rgba(59,130,246,.15);color:#60a5fa}
  .t-rest{background:rgba(245,158,11,.15);color:var(--amber)}
  .t-biz{background:rgba(34,211,238,.15);color:var(--accent2)}
  .t-stake{background:rgba(34,197,94,.15);color:var(--green)}
  .stage{font-size:12px}
  .stbar{height:5px;border-radius:3px;background:var(--line);margin-top:5px;position:relative;overflow:hidden}
  .stbar i{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),var(--green))}
  .src a{color:var(--accent2);text-decoration:none;font-size:12px}
  .src a:hover{text-decoration:underline}
  .note{color:var(--muted);font-size:11.5px;margin-top:4px}
  .st{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
  .st-new{background:var(--green);color:#04210f}
  .st-cont{background:var(--line);color:var(--muted)}
  .hw{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:#f97316;color:#1a0e00;margin-left:5px;vertical-align:middle}
  tr.hw-row{background:rgba(249,115,22,.07)}
  tr.hw-row:hover{background:rgba(249,115,22,.13)}
  tr.hw-row td:first-child{border-left:3px solid #f97316}
  footer{margin-top:22px;color:var(--muted);font-size:11.5px;border-top:1px solid var(--line);padding-top:14px}
  .count{color:var(--muted);font-size:12.5px;margin-left:auto}
  @media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}body{padding:14px}}
</style>
</head>

const TYPES = ["PEF 엑시트","경영권 매각","사업부 매각","구조조정·공개매각","지분매각"];
const typeClass = t => t==="PEF 엑시트"?"t-pef":t==="경영권 매각"?"t-mgmt":t==="사업부 매각"?"t-biz":t==="지분매각"?"t-stake":"t-rest";
const fmt = n => (!n||n<=0) ? "비공개" : n>=10000 ? (n/10000).toLocaleString('ko-KR',{maximumFractionDigits:1})+"조" : n.toLocaleString('ko-KR')+"억";
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);

let state={types:new Set(TYPES), q:"", sort:"stageRank", dir:-1, hwOnly:false};

document.getElementById('asof').textContent = "기준일 "+META.asOf;
document.getElementById('updated').textContent = "최종 갱신: "+META.lastUpdated;
document.getElementById('foot').innerHTML = META.note +
  "<br>출처: 딜사이트, 더벨, 이데일리 마켓인, 서울경제 시그널, 인베스트조선, 헤럴드경제, 파이낸셜뉴스, 한국경제 등 공개 보도. 매일 자동 갱신·전건 교차검증 대상.";

// type filter chips
const tf=document.getElementById('type-filter');
TYPES.forEach(t=>{
  const c=document.createElement('span');c.className='chip on';c.textContent=t;
  c.onclick=()=>{c.classList.toggle('on');c.classList.contains('on')?state.types.add(t):state.types.delete(t);render();};
  tf.appendChild(c);
});
document.getElementById('q').oninput=e=>{state.q=e.target.value.trim();render();};
document.getElementById('sort').onchange=e=>{state.sort=e.target.value;render();};
const hwBtn=document.getElementById('hw-only');
hwBtn.onclick=()=>{state.hwOnly=!state.hwOnly;hwBtn.classList.toggle('on',state.hwOnly);render();};
document.querySelectorAll('thead th').forEach(th=>{th.onclick=()=>{
  const k=th.dataset.k; const map={size:'size',stage:'stageRank',status:'firstSeen'};
  if(map[k]){state.sort=map[k];state.dir*=-1;render();}
};});

function statusBadge(d){
  const age=daysBetween(d.firstSeen, META.asOf);
  if(age<=0) return '<span class="st st-new">🆕 신규</span>';
  return `<span class="st st-cont">계속 D+${age}</span><div class="note">최초 ${d.firstSeen}</div>`;
}

function render(){
  let list=DEALS.filter(d=>state.types.has(d.type));
  if(state.hwOnly) list=list.filter(d=>d.hanwha);
  if(state.q){const q=state.q.toLowerCase();
    list=list.filter(d=>(d.target+d.seller+d.buyer+d.sector).toLowerCase().includes(q));}
  const k=state.sort;
  list.sort((a,b)=> (typeof a[k]==='number'? b[k]-a[k] : String(b[k]).localeCompare(String(a[k]))) );

  // KPI
  document.getElementById('k-count').innerHTML=list.length+' <small>건</small>';
  const tot=list.reduce((s,d)=>s+(d.size||0),0);

  document.getElementById('k-new').innerHTML=list.filter(d=>daysBetween(d.firstSeen,META.asOf)<=0).length+' <small>건</small>';
  document.getElementById('k-hw').innerHTML=list.filter(d=>d.hanwha).length+' <small>건</small>';
  document.getElementById('count').textContent=list.length+'건 표시';

      <td><span class="size">${fmt(d.size)}<small>${d.sizeNote}</small></span></td>
      <td>${d.seller}<br><span style="color:var(--muted)">→ ${d.buyer}</span></td>
      <td><span class="stage">${d.stage}</span><div class="stbar"><i style="width:${Math.max(d.stageRank,0)*20}%"></i></div><div class="note">${d.note}</div></td>
